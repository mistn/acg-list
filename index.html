<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次元图片瀑布流</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.yppp.net/js/pa-bBOG0gwkjpMZc_oQWcZmr.js"></script>
    <script>
        window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
        plausible.init()
    </script>
</head>

<body>
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <div class="container" id="image-container"></div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <!-- 左右切换按钮 - 固定屏幕两侧 -->
        <button class="lightbox-nav-btn" id="prev-btn" title="上一张">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M14 6L8 12L14 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button class="lightbox-nav-btn" id="next-btn" title="下一张">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M10 6L16 12L10 18" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- 主内容区 -->
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightbox-image" src="" alt="放大图片">
            <div class="lightbox-controls">
                <button class="glass-btn" id="copy-link-btn" title="复制链接">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                    </svg>
                </button>
                <button class="glass-btn" id="download-btn" title="查看原图">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="lightbox-overlay"></div>
    </div>

    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="back-to-top" title="返回顶部">&#8593;</button>

    <script src="script.js"></script>
</body>

</html>

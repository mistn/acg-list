<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次元图片瀑布流</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="stylesheet" href="style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.yppp.net/js/pa-bBOG0gwkjpMZc_oQWcZmr.js"></script>
    <script>
        window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
        plausible.init()
    </script>
</head>

<body>
    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>

    <div class="container" id="image-container"></div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <div class="lightbox-image-wrapper">
                <button class="glass-btn lightbox-nav-btn" id="prev-btn" title="上一张">
                    <span>&#8249;</span>
                </button>
                <img class="lightbox-image" id="lightbox-image" src="" alt="放大图片">
                <button class="glass-btn lightbox-nav-btn" id="next-btn" title="下一张">
                    <span>&#8250;</span>
                </button>
            </div>
            <div class="lightbox-controls">
                <button class="glass-btn" id="copy-link-btn" title="复制链接">
                    <span>复制链接</span>
                </button>
                <button class="glass-btn" id="download-btn" title="下载原图">
                    <span>下载原图</span>
                </button>
            </div>
        </div>
        <div class="lightbox-overlay"></div>
    </div>

    <!-- 返回顶部按钮 -->
    <button class="back-to-top" id="back-to-top" title="返回顶部">&#8593;</button>

    <script src="script.js"></script>
</body>

</html>

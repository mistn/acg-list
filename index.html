<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次元图片瀑布流</title>
    <link rel="icon" href="https://list.yppp.net/d/cos/yeqing.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.yppp.net/js/pa-bBOG0gwkjpMZc_oQWcZmr.js"></script>
    <script>
        window.plausible = window.plausible || function () { (plausible.q = plausible.q || []).push(arguments) }, plausible.init = plausible.init || function (i) { plausible.o = i || {} };
        plausible.init()
    </script>
</head>

<body>
    <div class="container" id="image-container"></div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <img class="lightbox-image" id="lightbox-image" src="" alt="放大图片">
            <div class="lightbox-controls">
                <button class="glass-btn" id="prev-btn" title="上一张">
                    <span>&#8249;</span>
                </button>
                <button class="glass-btn" id="copy-link-btn" title="复制链接">
                    <span>复制链接</span>
                </button>
                <button class="glass-btn" id="download-btn" title="下载原图">
                    <span>下载原图</span>
                </button>
                <button class="glass-btn" id="next-btn" title="下一张">
                    <span>&#8250;</span>
                </button>
            </div>
        </div>
        <div class="lightbox-overlay"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
